name: Backfill Price History

on:
  workflow_dispatch:
    inputs:
      days:
        description: 'Calendar days to backfill (300 ≈ 200 trading days)'
        required: false
        default: '300'

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run backfill
        run: python scripts/backfill.py --days ${{ github.event.inputs.days }}

      - name: Commit backfilled history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Backfill price history"
          git push
