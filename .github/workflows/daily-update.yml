name: Daily Stock Data Update

on:
  schedule:
    # 12:35 UTC = 6:05 PM IST - after market close and NSE's bhavcopy publish time
    - cron: '35 12 * * 1-5'
  workflow_dispatch: {}  # lets you trigger it manually from the Actions tab, for testing

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily pipeline
        run: python scripts/build_dataset.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Daily data update: $(date +'%Y-%m-%d')"
          git push
